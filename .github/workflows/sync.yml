name: Sync Fork

on:
  schedule:
    - cron: '0 0 * * *'  # 每天同步一次，可以根据需要调整
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2
        with:
          repository: 'lugw27/gao'
          ref: main

      - name: Set up git
        run: |
          git config user.name "lugw27"
          git config user.email "lugw27@live.com"
      
      - name: Add upstream
        run: git remote add upstream https://github.com/gaotianliuyun/gao.git
      
      - name: Fetch upstream
        run: git fetch upstream
      
      - name: Merge upstream
        run: git merge upstream/main

      - name: Push changes
        run: git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
